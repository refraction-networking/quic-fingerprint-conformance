# Rust/DPDK retina-quic-fp conformance. Heavy (builds retina + DPDK in a
# container), so it runs weekly, on demand, and when something that affects it
# changes — not on every push. Validated on Linux; see docker/README.md.
#
# Requires a secret `REFRACTION_CI_TOKEN` with read access to the private
# refraction-networking/retina-quic-fp repo. The container's cargo build fetches
# sippejw/retina + sippejw/tls-parser, which are public, so it needs no token.
name: conformance-retina

on:
  workflow_dispatch:
    inputs:
      debug_tmate:
        description: "Open a tmate SSH session into the runner if the job fails"
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * 1"
  push:
    paths:
      - "corpus/**"
      - "docker/**"
      - "harness/**"
      - ".github/workflows/retina.yml"
  pull_request:
    paths:
      - "corpus/**"
      - "docker/**"
      - "harness/**"

permissions:
  contents: read

jobs:
  retina:
    name: retina-quic-fp vs corpus (DPDK)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          path: quic-fingerprint-conformance
      - uses: actions/checkout@v4
        with:
          repository: refraction-networking/retina-quic-fp
          path: retina-quic-fp
          token: ${{ secrets.REFRACTION_CI_TOKEN }}
      - name: Build DPDK image
        run: docker build -t quicfp-conformance-dpdk quic-fingerprint-conformance/docker
      # Cache the cargo registry + compiled retina tree so re-runs skip the
      # ~15-min DPDK/Rust build (the container writes them to host-mounted dirs).
      - name: Cache retina build
        uses: actions/cache@v4
        with:
          path: |
            ci-cache/cargo
            ci-cache/target
          key: retina-build-${{ hashFiles('retina-quic-fp/Cargo.lock') }}
          restore-keys: retina-build-
      - name: Build retina + run conformance
        # --privileged: run-conformance.sh allocates 2 MB hugepages + mounts a
        # hugetlbfs (DPDK EAL needs a mount per reserved page size), builds retina
        # against apt DPDK 23.11, and runs `harness.check --impl retina`.
        #
        # --tmpfs /sys/bus/pci/devices: hide the runner's NICs from DPDK so EAL
        # doesn't probe (and fail on) them — GitHub's Azure runners have a
        # Mellanox mlx5 NIC whose PMD probe cascades to "Mempool creation
        # failed". Offline retina uses no NIC, so an empty PCI device list is
        # correct. STOPGAP: the proper fix is `--no-pci` in retina's offline EAL
        # args (get_eal_params), tracked as a future fix for the retina fork.
        #
        # CARGO_HOME/CARGO_TARGET_DIR point at the cached host dirs.
        run: |
          mkdir -p ci-cache/cargo ci-cache/target
          docker run --rm --privileged \
            --tmpfs /sys/bus/pci/devices \
            -v "$PWD":/work \
            -v "$PWD/ci-cache/cargo":/cargo -e CARGO_HOME=/cargo \
            -v "$PWD/ci-cache/target":/target -e CARGO_TARGET_DIR=/target \
            -e RETINA_DIR=/work/retina-quic-fp \
            -e CONFORMANCE_DIR=/work/quic-fingerprint-conformance \
            quicfp-conformance-dpdk run-conformance.sh
      - name: Restore cache dir ownership (container writes as root)
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" ci-cache 2>/dev/null || true
      - name: Debug via tmate (on failure, when manually requested)
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && inputs.debug_tmate }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
